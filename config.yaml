proxy:
  host: 127.0.0.1
  port: 8520
target:
  type: openai-compatible
  base_url: "https://api.deepseek.com"
  api_key: ""
  context_window:
    default: 1048576
  thinking:
    default:
      enabled: false
    deepseek-v4-flash:
      enabled: true
      effort: high
    deepseek-v4-pro:
      enabled: true
      effort: high
  model_mapping:
    gpt-4o: deepseek-v4-flash
    gpt-4o-mini: deepseek-v4-flash
    gpt-4-turbo: deepseek-v4-flash
    gpt-3.5-turbo: deepseek-v4-flash
    gpt-5.4: deepseek-v4-flash
    gpt-5.5: deepseek-v4-pro
    claude-3-opus-20240229: deepseek-v4-flash
    claude-3-sonnet-20240229: deepseek-v4-flash
    claude-3-haiku-20240307: deepseek-v4-flash
    claude-3-5-sonnet-20241022: deepseek-v4-flash
    claude-3-5-haiku-20241022: deepseek-v4-flash
    default: deepseek-v4-flash
intercept_domains:
  - "api.openai.com"
  - "api.anthropic.com"
  - "generativelanguage.googleapis.com"
  - "api.groq.com"
  - "api.openrouter.ai"
smart_intercept_domains:
  - "openrouter.ai"
log_level: debug
